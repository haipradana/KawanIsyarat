name: kawan_isyarat
description: KawanIsyarat — Jembatan Komunikasi Inklusif. An offline-first communication bridge between Deaf and Hearing users in Indonesia using BISINDO sign language.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  google_fonts: ^6.2.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_tts: ^4.0.2
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  intl: ^0.19.0
  google_sign_in: ^7.2.0
  path_provider: ^2.1.3
  http: ^1.2.1
  tflite_flutter: ^0.11.0
  camera: ^0.11.0+2
  permission_handler: ^11.3.1
  image: ^4.2.0
  record: ^6.2.0
  audioplayers: ^6.6.0
  google_mlkit_pose_detection: ^0.12.0
  google_mlkit_commons: ^0.8.0
  hand_landmarker: ^2.1.2
  video_player: ^2.9.1
  # flutter_gemma removed — using Cactus SDK for Gemma. Re-add if switching back to LiteRT LM.

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo_kawanisyarat.png"
  adaptive_icon_background: "#F9F9F7"
  adaptive_icon_foreground: "assets/images/logo_kawanisyarat.png"
  min_sdk_android: 21
  web:
    generate: false

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/alfabet/sibi/
    - assets/images/alfabet/bisindo/
    - assets/models/
    - assets/videos/bisindo/
